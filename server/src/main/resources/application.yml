spring:
  application:
    name: when7meet-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/when7meet}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: ${DB_MINIMUM_IDLE:1}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origin: ${APP_ALLOWED_ORIGIN:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
